<svg width="340" height="190" xmlns="http://www.w3.org/2000/svg">
<style>
svg {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial, sans-serif;
  font-size: 14px;
  line-height: 21px;
}

#background {
  width: calc(100% - 10px);
  height: calc(100% - 10px);
  fill: #00000000;
  stroke: #e4e2e2;
  stroke-width: 1px;
  rx: 6px;
  ry: 6px;
}

foreignObject {
  width: calc(100% - 10px - 32px);
  height: calc(100% - 10px - 24px);
}

h2 {
  margin-top: 0;
  margin-bottom: 10px;
  line-height: 20px;
  font-size: 13px;
  font-weight: 500;
  color: #656d76;
  fill: #656d76;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

ul {
  list-style: none;
  padding-left: 0;
  margin-top: 0;
  margin-bottom: 0;
}

li {
  display: inline-flex;
  font-size: 12px;
  margin-right: 1.5ch;
  align-items: center;
  flex-wrap: nowrap;
  transform: translateX(-500%);
  animation-duration: 0.6s;
  animation-name: slideIn;
  animation-timing-function: ease-out;
  animation-fill-mode: forwards;
}

@keyframes slideIn {
  to {
    transform: translateX(0);
  }
}

div.ellipsis {
  height: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
}

.octicon {
  margin-right: 0.4ch;
  vertical-align: top;
}

.progress {
  display: flex;
  height: 8px;
  overflow: hidden;
  background-color: #e4e2e2;
  border-radius: 6px;
  outline: 1px solid transparent;
  margin-bottom: 12px;
}

.progress-item {
  border-radius: 0;
}

.progress-item:first-child {
  border-radius: 6px 0 0 6px;
}

.progress-item:last-child {
  border-radius: 0 6px 6px 0;
}

.lang {
  font-weight: 600;
  margin-right: 3px;
  color: #1f2328;
}

.percent {
  color: #656d76;
  font-weight: 400;
}
</style>
