name: Deploy Dungeon

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'dungeon/**'

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        working-directory: dungeon
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
